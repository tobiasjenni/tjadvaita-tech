<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — TJ Advaita</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{--gold:#c9a96e;--muted:rgba(255,255,255,0.55)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#fff;font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
  .code{font-family:'Cormorant Garamond',serif;font-size:clamp(5rem,15vw,9rem);font-weight:400;color:var(--gold);line-height:1;opacity:0.9}
  .line{width:40px;height:1px;background:var(--gold);opacity:0.5;margin:28px auto}
  h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:400;font-style:italic;color:#fff;margin-bottom:14px}
  p{font-size:0.9rem;color:var(--muted);font-weight:300;max-width:420px;line-height:1.8;margin-bottom:36px}
  a{display:inline-block;padding:13px 34px;border:1px solid var(--gold);color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;transition:all 0.3s}
  a:hover{background:var(--gold);color:#000}
</style>
</head>
<body>
<div class="code">404</div>
<div class="line"></div>
<h1>The path you seek does not exist.</h1>
<p>Like all things that appear and disappear — this page is an illusion. What you are looking for is elsewhere. Perhaps it was always within.</p>
<a href="/">&larr; Return Home</a>
</body>
</html>
